name: "changelogfa.st Release Notes"
description: "Generate release notes on each release — enrich the GitHub Release or open a CHANGELOG.md PR. Keyless, just install the App."
author: "changelogfa.st"
branding:
  icon: "file-text"
  color: "purple"

inputs:
  style:
    description: "Release note style (e.g. technical, marketing)."
    required: false
    default: "technical"
  output:
    description: "What to produce: release (enrich the GitHub Release), pr (open a CHANGELOG.md PR), or both."
    required: false
    default: "release"
  api-url:
    description: "changelogfa.st API base URL. Override only for self-hosting/testing."
    required: false
    default: "https://www.changelogfa.st"

outputs:
  release-url:
    description: "URL of the enriched GitHub Release (when output includes 'release')."
    value: ${{ steps.generate.outputs.release-url }}
  pr-url:
    description: "URL of the opened CHANGELOG.md pull request (when output includes 'pr')."
    value: ${{ steps.generate.outputs.pr-url }}

runs:
  using: "composite"
  steps:
    - id: generate
      shell: bash
      run: |
        set -euo pipefail

        # 1. Mint a keyless OIDC token proving this run belongs to this repo.
        if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ]; then
          echo "::error::Missing OIDC token. Add 'permissions: { id-token: write }' to the job."
          exit 1
        fi
        OIDC=$(curl -sS \
          -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
          "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=changelogfa.st" | jq -r '.value')

        # 2. Ask changelogfa.st to generate the release note(s).
        #    -L follows a 30x apex->www redirect while preserving the POST body.
        RESP=$(curl -sS -L -w $'\n%{http_code}' -X POST "${{ inputs.api-url }}/api/action/release-notes" \
          -H "Authorization: Bearer $OIDC" \
          -H "Content-Type: application/json" \
          -d "{\"style\":\"${{ inputs.style }}\",\"output\":\"${{ inputs.output }}\"}")
        CODE=$(printf '%s' "$RESP" | tail -n1)
        JSON=$(printf '%s' "$RESP" | sed '$d')
        printf '%s\n' "$JSON" | jq . || printf '%s\n' "$JSON"

        if [ "$CODE" != "200" ]; then
          echo "::error::changelogfa.st returned HTTP $CODE"
          exit 1
        fi

        RELEASE=$(printf '%s' "$JSON" | jq -r '.release_url // empty')
        PR=$(printf '%s' "$JSON" | jq -r '.pr_url // empty')
        [ -n "$RELEASE" ] && echo "✅ Enriched GitHub Release: $RELEASE"
        [ -n "$PR" ] && echo "✅ Opened changelog PR: $PR"
        echo "release-url=$RELEASE" >> "$GITHUB_OUTPUT"
        echo "pr-url=$PR" >> "$GITHUB_OUTPUT"
